<div class="screen" id="map-screen">
  <div style="position:absolute;top:0;left:0;right:0;z-index:600;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;">
    <span style="font-size:15px;font-weight:600;color:#111;">9:30</span>
  </div>
  <div id="map-wrap">
    <div id="leaflet-map"></div>
    <!-- Search row with AI button -->
    <div class="map-top">
      <div class="search-row">
        <div class="search-bar" onclick="focusSearch()" style="cursor:text;">
          
          <input id="search-inp" type="text" placeholder="Search your Vibes"
            style="flex:1;border:none;background:transparent;font-size:14px;font-family:'Inter',sans-serif;color:#111;outline:none;min-width:0;"
            oninput="openSearch();liveSearch(this.value)"
            onfocus="openSearch()"
            onblur="setTimeout(closeSearch,200)">
   
          <div onclick="showScreen('filter-screen')" style="width:28px;height:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;">
            <span style="display:block;width:16px;height:2px;background:#888;border-radius:2px;"></span>
            <span style="display:block;width:11px;height:2px;background:#888;border-radius:2px;"></span>
            <span style="display:block;width:6px;height:2px;background:#888;border-radius:2px;"></span>
          </div>
        </div>
        <div id="search-drop" class="search-drop"><div id="search-results-drop"></div></div>
        <div class="ai-inline-btn" onclick="openAI()">
          <!-- Brain / neural network icon -->
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
            <path d="M9.5 2a2.5 2.5 0 0 1 2.45 2H13a3 3 0 0 1 3 3v.5a2.5 2.5 0 0 1 0 5V13a3 3 0 0 1-3 3h-.05A2.5 2.5 0 0 1 7 15.5V15a3 3 0 0 1-3-3v-.5a2.5 2.5 0 0 1 0-5V6a3 3 0 0 1 3-3h2.5z"/>
            <circle cx="12" cy="8" r="1.2" fill="currentColor"/>
            <circle cx="9" cy="11" r="1" fill="currentColor"/>
            <circle cx="15" cy="11" r="1" fill="currentColor"/>
            <circle cx="12" cy="14" r="1.2" fill="currentColor"/>
            <line x1="12" y1="8" x2="9" y2="11"/><line x1="12" y1="8" x2="15" y2="11"/>
            <line x1="9" y1="11" x2="12" y2="14"/><line x1="15" y1="11" x2="12" y2="14"/>
          </svg>
          <span class="ai-label">Vibes AI</span>
        </div>
        <div id="search-drop" class="search-drop"><div id="search-results-drop"></div></div>
      </div>
    </div>
    <!-- Right controls: Location → Zoom+ → Zoom- -->
    <div class="map-right-controls">
      <div class="map-ctrl-btn" onclick="centerMap()" title="My location">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg>
      </div>
      <div class="map-ctrl-btn" onclick="map&&map.zoomIn()" title="Zoom in">+</div>
      <div class="map-ctrl-btn" onclick="map&&map.zoomOut()" title="Zoom out">−</div>
    </div>
    <!-- Navigation Panel -->
    <div class="nav-panel" id="nav-panel">
      <div class="nav-panel-header">
        <div class="nav-dest">
          <div class="nav-dest-label">Navigating to</div>
          <div class="nav-dest-name" id="nav-dest-name">Skybar</div>
        </div>
        <div class="nav-close-btn" onclick="clearRoute()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </div>
      </div>
      <div class="nav-mode-row">
        <button class="nav-mode-btn active" id="mode-walk" onclick="switchMode('walk')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0m-1.5 3.5 2 2L15 14h-2l-1.5-3-2 2V16H8v-4l3-2.5"/><path d="M10 20l1-4"/></svg>
          Walk
        </button>
        <button class="nav-mode-btn" id="mode-car" onclick="switchMode('car')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><rect x="7" y="14" width="10" height="6" rx="1"/><path d="M5 17v2a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-2M15 17v2a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-2"/><path d="M3 11h18"/><path d="M7 7l1.5-4h7L17 7"/></svg>
          Drive
        </button>
      </div>
      <div class="nav-stats">
        <div class="nav-stat"><div class="sv" id="nav-dist">—</div><div class="sl">Distance</div></div>
        <div class="nav-stat"><div class="sv" id="nav-time">—</div><div class="sl">Duration</div></div>
        <div class="nav-stat"><div class="sv" id="nav-eta">—</div><div class="sl">Arrive</div></div>
      </div>
      <div class="nav-steps" id="nav-steps">
        <div class="nav-loading">Building route…</div>
      </div>
      <button class="nav-start-btn" id="nav-start-btn" onclick="openInMaps()">🗺 Open in Maps</button>
    </div>
  </div>

<
